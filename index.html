<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quiz Pro | Premium Edition</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>

    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            min-height: 100vh; color: #f8fafc; overflow-x: hidden;
        }
        .glass { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(16px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 2.5rem;
        }
        .btn-choice {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-choice:hover { background: rgba(99, 102, 241, 0.15); border-color: #6366f1; transform: translateY(-2px); }
        .btn-choice:active { transform: scale(0.97); }
        .hidden-section { display: none; }
        .section-fade { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-10 flex items-center justify-center">

    <div id="app" class="w-full max-w-xl">
        
        <div id="loading" class="text-center py-20 section-fade">
            <div class="w-14 h-14 border-4 border-indigo-500/20 border-t-indigo-500 rounded-full animate-spin mx-auto mb-6"></div>
            <p class="text-indigo-400 font-extrabold tracking-widest uppercase text-sm">Инициализация...</p>
        </div>

        <div id="menu" class="hidden-section glass p-10 md:p-14 text-center section-fade">
            <div class="inline-block p-4 bg-indigo-500/10 rounded-3xl mb-6">
                <svg class="w-10 h-10 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
            </div>
            <h1 class="text-5xl font-black mb-3 tracking-tighter">Quiz<span class="text-indigo-500">Elite</span></h1>
            <p id="menu-info" class="text-slate-400 mb-12 font-medium text-lg"></p>
            <div class="space-y-4">
                <button id="btn-start" class="w-full py-6 bg-indigo-600 hover:bg-indigo-500 rounded-2xl text-xl font-bold shadow-2xl shadow-indigo-600/30 transition-all active:scale-95">НАЧАТЬ</button>
                <button id="btn-create" class="w-full py-6 bg-white/5 hover:bg-white/10 border border-white/10 rounded-2xl text-xl font-bold transition-all">КОНСТРУКТОР</button>
            </div>
        </div>

        <div id="quiz" class="hidden-section section-fade">
            <div class="flex justify-between items-center mb-8 px-2">
                <div class="bg-indigo-500/10 px-6 py-3 rounded-2xl border border-indigo-500/20 shadow-lg shadow-indigo-500/5">
                    <span id="timer" class="text-3xl font-black text-indigo-400 font-mono">00:00</span>
                </div>
                <div id="progress" class="text-xs font-black text-slate-500 uppercase tracking-[0.2em]">Вопрос 01 / 00</div>
            </div>
            <div class="glass p-8 md:p-12">
                <h2 id="q-text" class="text-2xl md:text-3xl font-extrabold text-center mb-12 leading-snug">...</h2>
                <div id="options-box" class="grid grid-cols-1 gap-4">
                    </div>
            </div>
        </div>

        <div id="constructor" class="hidden-section glass p-8 md:p-12 section-fade">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-3xl font-black">Создание</h2>
                <button id="back-to-menu" class="p-3 bg-white/5 rounded-xl border border-white/10 hover:bg-white/10 transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                </button>
            </div>
            
            <div class="space-y-8">
                <div class="p-5 bg-black/20 rounded-3xl border border-white/5">
                    <label class="block text-[10px] font-black text-indigo-400 uppercase tracking-widest mb-3">Время на тест (минуты)</label>
                    <input id="new-timer" type="number" value="10" class="w-full bg-transparent text-2xl font-bold outline-none border-b border-white/10 pb-2 text-white">
                </div>

                <div id="q-list" class="custom-scroll max-h-[140px] overflow-y-auto space-y-2"></div>

                <div class="p-6 bg-white/5 rounded-3xl border border-white/10 space-y-5">
                    <input id="new-q" type="text" placeholder="Введите вопрос..." class="w-full bg-slate-900/50 p-4 rounded-2xl outline-none border border-white/10 focus:border-indigo-500 transition-colors">
                    
                    <div class="space-y-3">
                        <div class="flex gap-3">
                            <input id="opt-0" type="text" placeholder="Вариант 1" class="flex-1 bg-slate-900/50 p-4 rounded-2xl border border-white/5 text-sm outline-none">
                            <button onclick="window.setCorrect(0)" id="m-0" class="w-14 bg-white/5 rounded-2xl border border-white/10 transition-all flex items-center justify-center font-bold">1</button>
                        </div>
                        <div class="flex gap-3">
                            <input id="opt-1" type="text" placeholder="Вариант 2" class="flex-1 bg-slate-900/50 p-4 rounded-2xl border border-white/5 text-sm outline-none">
                            <button onclick="window.setCorrect(1)" id="m-1" class="w-14 bg-white/5 rounded-2xl border border-white/10 transition-all flex items-center justify-center font-bold">2</button>
                        </div>
                        <div class="flex gap-3">
                            <input id="opt-2" type="text" placeholder="Вариант 3" class="flex-1 bg-slate-900/50 p-4 rounded-2xl border border-white/5 text-sm outline-none">
                            <button onclick="window.setCorrect(2)" id="m-2" class="w-14 bg-white/5 rounded-2xl border border-white/10 transition-all flex items-center justify-center font-bold">3</button>
                        </div>
                    </div>
                    
                    <button id="add-q" class="w-full py-4 bg-indigo-500/10 text-indigo-400 font-black rounded-2xl hover:bg-indigo-500 hover:text-white transition-all uppercase tracking-widest text-sm">Добавить вопрос</button>
                </div>

                <button id="gen-link" class="w-full py-6 bg-emerald-600 hover:bg-emerald-500 rounded-3xl font-black text-xl shadow-2xl shadow-emerald-600/30 transition-all active:scale-95 uppercase tracking-tighter">Сформировать ссылку</button>

                <div id="share-box" class="hidden-section section-fade p-6 bg-emerald-500/10 rounded-3xl border border-emerald-500/20">
                    <p class="text-[10px] font-black text-emerald-400 uppercase mb-4 tracking-widest text-center">Ваша персональная ссылка:</p>
                    <div class="space-y-4">
                        <input id="share-url" readonly class="w-full bg-black/40 p-4 rounded-2xl text-[10px] text-emerald-200 outline-none border border-emerald-500/10 text-center">
                        <button id="copy-btn" class="w-full py-4 bg-emerald-500 rounded-2xl font-black text-white shadow-lg transition-all active:scale-95 uppercase text-xs tracking-widest">Копировать ссылку</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="results" class="hidden-section glass p-10 md:p-14 text-center section-fade">
            <div id="res-icon" class="w-24 h-24 bg-indigo-500/10 rounded-full flex items-center justify-center mx-auto mb-8 shadow-inner">
                <svg class="w-12 h-12 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>
            </div>
            <h2 class="text-7xl font-black mb-2 tracking-tighter text-white" id="res-perc">0%</h2>
            <p class="text-slate-400 mb-10 text-xl font-medium" id="res-text"></p>
            <div id="res-list" class="space-y-3 mb-10 text-left max-h-[250px] overflow-y-auto pr-2 custom-scroll"></div>
            <button onclick="window.location.reload()" class="w-full py-6 bg-white/5 hover:bg-white/10 rounded-2xl font-black border border-white/10 transition-all">ВЕРНУТЬСЯ В МЕНЮ</button>
        </div>

    </div>

    <script>
        // Управление выбором правильного ответа
        window.correctIdx = 0;
        window.setCorrect = (idx) => {
            window.correctIdx = idx;
            for(let i=0; i<3; i++) {
                const b = document.getElementById('m-' + i);
                if(i === idx) {
                    b.classList.add('bg-emerald-500', 'border-emerald-500', 'text-white');
                    b.classList.remove('bg-white/5', 'text-white/40');
                } else {
                    b.classList.remove('bg-emerald-500', 'border-emerald-500', 'text-white');
                    b.classList.add('bg-white/5', 'text-white/40');
                }
            }
        };
        window.setCorrect(0);
    </script>

    <script type="py">
        import js
        import json
        import base64
        import asyncio
        from pyodide.ffi import create_proxy

        class QuizEngine:
            def __init__(self):
                self.questions = []
                self.user_answers = []
                self.current_idx = 0
                self.total_time = 600
                self.time_left = 600
                self.is_running = False
                
                self.load_logic()
                self.setup_ui()
                self.show("menu")
                js.document.getElementById("loading").style.display = "none"

            def load_logic(self):
                params = js.URLSearchParams.new(js.window.location.search)
                data_raw = params.get("q")
                if data_raw:
                    try:
                        data = json.loads(base64.b64decode(data_raw).decode('utf-8'))
                        self.questions = data.get("q", [])
                        self.total_time = data.get("t", 600)
                    except: self.set_defaults()
                else: self.set_defaults()
                
                js.document.getElementById("menu-info").innerHTML = f"{len(self.questions)} вопросов • {self.total_time // 60} мин."

            def set_defaults(self):
                # Расширенный набор дефолтных вопросов
                self.questions = [
                    {"q": "Столица Франции?", "o": ["Марсель", "Лион", "Париж"], "a": "Париж"},
                    {"q": "Сколько будет 15 * 4?", "o": ["50", "60", "70"], "a": "60"},
                    {"q": "Самая большая планета?", "o": ["Марс", "Юпитер", "Сатурн"], "a": "Юпитер"},
                    {"q": "Корень из 144?", "o": ["12", "14", "10"], "a": "12"},
                    {"q": "В каком году Гагарин полетел в космос?", "o": ["1957", "1961", "1965"], "a": "1961"},
                    {"q": "Чему равно число Пи (до сотых)?", "o": ["3.12", "3.14", "3.16"], "a": "3.14"}
                ]
                self.total_time = 300

            def show(self, sid):
                for s in ["menu", "quiz", "constructor", "results"]:
                    js.document.getElementById(s).classList.add("hidden-section")
                js.document.getElementById(sid).classList.remove("hidden-section")

            def start_game(self, e):
                self.current_idx = 0
                self.user_answers = []
                self.time_left = self.total_time
                self.is_running = True
                self.draw_question()
                self.show("quiz")
                asyncio.create_task(self.timer_loop())

            async def timer_loop(self):
                while self.time_left > 0 and self.is_running:
                    m, s = divmod(self.time_left, 60)
                    js.document.getElementById("timer").innerHTML = f"{m:02d}:{s:02d}"
                    if self.time_left <= 30: js.document.getElementById("timer").style.color = "#fb7185"
                    await asyncio.sleep(1)
                    self.time_left -= 1
                if self.time_left <= 0 and self.is_running: self.end_game()

            def draw_question(self):
                if self.current_idx < len(self.questions):
                    q = self.questions[self.current_idx]
                    js.document.getElementById("q-text").innerHTML = q["q"]
                    js.document.getElementById("progress").innerHTML = f"Вопрос {self.current_idx + 1:02d} / {len(self.questions):02d}"
                    
                    box = js.document.getElementById("options-box")
                    box.innerHTML = ""
                    for option in q["o"]:
                        btn = js.document.createElement("button")
                        btn.className = "btn-choice py-5 px-8 rounded-3xl text-lg font-bold text-left"
                        btn.innerHTML = option
                        btn.onclick = create_proxy(lambda e, v=option: self.handle_answer(v))
                        box.appendChild(btn)
                else: self.end_game()

            def handle_answer(self, val):
                self.user_answers.append(val)
                self.current_idx += 1
                self.draw_question()

            def end_game(self):
                self.is_running = False
                win_count = 0
                res_box = js.document.getElementById("res-list")
                res_box.innerHTML = ""
                
                for i, q in enumerate(self.questions):
                    ans = self.user_answers[i] if i < len(self.user_answers) else "Пропущено"
                    is_correct = str(ans) == str(q["a"])
                    if is_correct: win_count += 1
                    
                    bg = "bg-emerald-500/5 border-emerald-500/10" if is_correct else "bg-rose-500/5 border-rose-500/10"
                    color = "text-emerald-400" if is_correct else "text-rose-400"
                    
                    res_box.innerHTML += f"""
                        <div class="p-5 {bg} rounded-2xl border text-sm">
                            <p class="font-bold mb-2 opacity-90">{q['q']}</p>
                            <div class="flex justify-between items-center">
                                <span class="text-white/30">Ответ: {ans}</span>
                                <span class="{color} font-black uppercase text-[10px]">{q['a']}</span>
                            </div>
                        </div>
                    """
                
                p = int((win_count / len(self.questions)) * 100) if self.questions else 0
                js.document.getElementById("res-perc").innerHTML = f"{p}%"
                js.document.getElementById("res-text").innerHTML = f"Решено {win_count} из {len(self.questions)}"
                self.show("results")

            def add_new_q(self, e):
                txt = js.document.getElementById("new-q").value
                opts = [js.document.getElementById(f"opt-{i}").value for i in range(3)]
                if txt and all(opts):
                    correct_text = opts[int(js.window.correctIdx)]
                    if len(self.questions) > 0 and self.questions[0]["q"] == "Столица Франции?":
                        self.questions = []
                    self.questions.append({"q": txt, "o": opts, "a": correct_text})
                    self.sync_list()
                    js.document.getElementById("new-q").value = ""
                    for i in range(3): js.document.getElementById(f"opt-{i}").value = ""

            def sync_list(self):
                l = js.document.getElementById("q-list")
                l.innerHTML = "".join([f"<div class='bg-white/5 p-3 rounded-xl border border-white/5 text-[10px] font-bold text-indigo-300'>{i+1}. {q['q']}</div>" for i, q in enumerate(self.questions)])

            def generate_url(self, e):
                t_min = int(js.document.getElementById("new-timer").value or 10)
                blob = base64.b64encode(json.dumps({"q": self.questions, "t": t_min * 60}).encode()).decode()
                full_url = f"{js.window.location.origin}{js.window.location.pathname}?q={blob}"
                js.document.getElementById("share-url").value = full_url
                js.document.getElementById("share-box").classList.remove("hidden-section")

            def copy_to_clipboard(self, e):
                u = js.document.getElementById("share-url").value
                js.navigator.clipboard.writeText(u)
                btn = js.document.getElementById("copy-btn")
                btn.innerHTML = "ГОТОВО!"
                btn.classList.add("bg-indigo-600")
                async def reset():
                    await asyncio.sleep(2)
                    btn.innerHTML = "КОПИРОВАТЬ ССЫЛКУ"
                    btn.classList.remove("bg-indigo-600")
                asyncio.create_task(reset())

            def setup_ui(self):
                js.document.getElementById("btn-start").onclick = create_proxy(self.start_game)
                js.document.getElementById("btn-create").onclick = create_proxy(lambda e: self.show("constructor"))
                js.document.getElementById("back-to-menu").onclick = create_proxy(lambda e: self.show("menu"))
                js.document.getElementById("add-q").onclick = create_proxy(self.add_new_q)
                js.document.getElementById("gen-link").onclick = create_proxy(self.generate_url)
                js.document.getElementById("copy-btn").onclick = create_proxy(self.copy_to_clipboard)

        engine = QuizEngine()
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quiz Elite | Premium</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>

    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: radial-gradient(circle at 50% 0%, #1e1b4b, #020617);
            min-height: 100vh; color: #f8fafc; overflow-x: hidden;
        }
        .glass { 
            background: rgba(255, 255, 255, 0.02); 
            backdrop-filter: blur(25px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 40px -15px rgba(99, 102, 241, 0.2);
        }
        .btn-choice {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-choice:hover { 
            background: rgba(99, 102, 241, 0.1); 
            border-color: rgba(99, 102, 241, 0.4); 
        }
        .lang-btn { transition: all 0.2s; opacity: 0.4; }
        .lang-btn.active { opacity: 1; color: #6366f1; font-weight: 800; }
        
        .hidden-section { display: none !important; }
        .section-fade { animation: fadeIn 0.6s cubic-bezier(0.22, 1, 0.36, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        
        .custom-scroll::-webkit-scrollbar { width: 3px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.05); border-radius: 10px; }
    </style>
</head>
<body class="p-6 md:p-10 flex items-center justify-center">

    <div id="lang-box" class="fixed top-6 right-6 flex gap-4 text-xs font-bold tracking-tighter z-50 glass px-4 py-2 section-fade">
        <button id="lang-ru" class="lang-btn active">RU</button>
        <div class="w-[1px] bg-white/10 h-3 self-center"></div>
        <button id="lang-en" class="lang-btn">EN</button>
    </div>

    <div id="app" class="w-full max-w-xl">
        
        <div id="menu" class="glass p-10 md:p-14 text-center section-fade">
            <h1 class="text-5xl font-black mb-2 tracking-tighter bg-gradient-to-b from-white to-indigo-400 bg-clip-text text-transparent">Quiz<span class="text-indigo-500">Elite</span></h1>
            <p id="menu-info" class="text-slate-500 mb-12 font-medium text-sm tracking-wide"></p>
            <div class="space-y-4">
                <button id="btn-start" class="w-full py-6 bg-indigo-600 hover:bg-indigo-500 rounded-2xl text-xl font-bold shadow-xl shadow-indigo-600/20 transition-all active:scale-95">START</button>
                <button id="btn-create" class="w-full py-6 bg-white/[0.02] hover:bg-white/[0.05] border border-white/5 rounded-2xl text-xl font-bold transition-all">CONSTRUCTOR</button>
            </div>
        </div>

        <div id="quiz" class="hidden-section section-fade">
            <div class="flex justify-between items-center mb-8 px-2">
                <div class="glass px-6 py-2 border-indigo-500/20">
                    <span id="timer" class="text-2xl font-black text-indigo-400 font-mono tracking-tighter">00:00</span>
                </div>
                <div id="progress" class="text-[10px] font-black text-slate-500 uppercase tracking-[0.3em]"></div>
            </div>
            <div class="glass p-8 md:p-12">
                <h2 id="q-text" class="text-2xl md:text-3xl font-extrabold text-center mb-12 leading-tight"></h2>
                <div id="options-box" class="grid grid-cols-1 gap-3"></div>
            </div>
        </div>

        <div id="constructor" class="hidden-section glass p-8 md:p-12 section-fade">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-black tracking-tighter" id="const-title">Создание</h2>
                <button id="back-to-menu" class="p-3 bg-white/5 rounded-xl border border-white/10 hover:bg-white/10 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                </button>
            </div>
            
            <div class="space-y-6">
                <div class="p-5 bg-white/[0.02] rounded-3xl border border-white/5">
                    <label class="block text-[10px] font-black text-indigo-400 uppercase tracking-widest mb-2 opacity-60" id="label-time">Время (мин)</label>
                    <input id="new-timer" type="number" value="10" class="w-full bg-transparent text-xl font-bold outline-none text-white">
                </div>

                <div id="q-list" class="custom-scroll max-h-[100px] overflow-y-auto space-y-2"></div>

                <div class="p-6 bg-white/[0.02] rounded-3xl border border-white/5 space-y-4">
                    <input id="new-q" type="text" placeholder="..." class="w-full bg-slate-900/40 p-4 rounded-xl outline-none border border-white/5 focus:border-indigo-500/50 transition-all">
                    
                    <div class="grid grid-cols-1 gap-2 w-full">
                        <div class="flex gap-2">
                            <input id="opt-0" type="text" class="flex-1 min-w-0 bg-slate-900/40 p-3 rounded-xl border border-white/5 text-sm outline-none">
                            <button onclick="window.setCorrect(0)" id="m-0" class="w-12 h-[3.25rem] shrink-0 glass border-none transition-all flex items-center justify-center font-bold">1</button>
                        </div>
                        <div class="flex gap-2">
                            <input id="opt-1" type="text" class="flex-1 min-w-0 bg-slate-900/40 p-3 rounded-xl border border-white/5 text-sm outline-none">
                            <button onclick="window.setCorrect(1)" id="m-1" class="w-12 h-[3.25rem] shrink-0 glass border-none transition-all flex items-center justify-center font-bold">2</button>
                        </div>
                        <div class="flex gap-2">
                            <input id="opt-2" type="text" class="flex-1 min-w-0 bg-slate-900/40 p-3 rounded-xl border border-white/5 text-sm outline-none">
                            <button onclick="window.setCorrect(2)" id="m-2" class="w-12 h-[3.25rem] shrink-0 glass border-none transition-all flex items-center justify-center font-bold">3</button>
                        </div>
                    </div>
                    
                    <button id="add-q" class="w-full py-4 bg-indigo-500/10 text-indigo-400 font-black rounded-xl hover:bg-indigo-500 hover:text-white transition-all uppercase tracking-widest text-[10px]">Добавить вопрос</button>
                </div>

                <button id="gen-link" class="w-full py-5 bg-emerald-600/80 hover:bg-emerald-500 rounded-2xl font-black text-lg transition-all active:scale-95 uppercase tracking-tighter">Сформировать ссылку</button>

                <div id="share-box" class="hidden-section section-fade p-6 glass border-emerald-500/20">
                    <div class="space-y-4">
                        <input id="share-url" readonly class="w-full bg-black/20 p-3 rounded-xl text-[10px] text-emerald-200 outline-none border border-emerald-500/10 text-center">
                        <button id="copy-btn" class="w-full py-3 bg-emerald-500 rounded-xl font-black text-white text-[10px] tracking-widest uppercase">Copy Link</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="results" class="hidden-section glass p-10 md:p-14 text-center section-fade">
            <h2 class="text-7xl font-black mb-2 tracking-tighter bg-gradient-to-b from-white to-indigo-400 bg-clip-text text-transparent" id="res-perc">0%</h2>
            <p class="text-slate-400 mb-10 text-lg font-medium" id="res-text"></p>
            <div id="res-list" class="space-y-2 mb-10 text-left max-h-[250px] overflow-y-auto pr-2 custom-scroll"></div>
            <button id="btn-restart-fast" class="w-full py-6 bg-white/[0.02] hover:bg-white/[0.05] rounded-2xl font-black border border-white/5 transition-all uppercase">RESTART</button>
        </div>

    </div>

    <script>
        window.correctIdx = 0;
        window.setCorrect = (idx) => {
            window.correctIdx = idx;
            for(let i=0; i<3; i++) {
                const b = document.getElementById('m-' + i);
                b.style.background = (i === idx) ? '#6366f1' : 'rgba(255,255,255,0.05)';
                b.style.color = (i === idx) ? '#fff' : 'rgba(255,255,255,0.4)';
            }
        };
        window.setCorrect(0);
    </script>

    <script type="py">
        import js, json, base64, asyncio
        from pyodide.ffi import create_proxy

        LANGS = {
            "RU": {
                "start": "НАЧАТЬ", "const": "КОНСТРУКТОР", "info": "{} вопросов • {} мин.",
                "progress": "Вопрос {} / {}", "time_label": "Время на тест (мин)", "add_q": "ДОБАВИТЬ ВОПРОС",
                "gen": "СФОРМИРОВАТЬ ССЫЛКУ", "copy": "КОПИРОВАТЬ", "done": "ГОТОВО!",
                "res": "Решено {} из {}", "q_ph": "Введите вопрос...", "const_t": "Создание", "restart": "РЕСТАРТ",
                "def_qs": [
                    {"q": "Столица Франции?", "o": ["Марсель", "Лион", "Париж"], "a": "Париж"},
                    {"q": "Сколько будет 15 * 4?", "o": ["50", "60", "70"], "a": "60"},
                    {"q": "Самая большая планета?", "o": ["Марс", "Юпитер", "Сатурн"], "a": "Юпитер"}
                ]
            },
            "EN": {
                "start": "START", "const": "CONSTRUCTOR", "info": "{} questions • {} min.",
                "progress": "Question {} / {}", "time_label": "Time Limit (min)", "add_q": "ADD QUESTION",
                "gen": "GENERATE LINK", "copy": "COPY LINK", "done": "COPIED!",
                "res": "Solved {} of {}", "q_ph": "Enter question...", "const_t": "Constructor", "restart": "RESTART",
                "def_qs": [
                    {"q": "Capital of France?", "o": ["Marseille", "Lyon", "Paris"], "a": "Paris"},
                    {"q": "What is 15 * 4?", "o": ["50", "60", "70"], "a": "60"},
                    {"q": "Largest planet?", "o": ["Mars", "Jupiter", "Saturn"], "a": "Jupiter"}
                ]
            }
        }

        class QuizEngine:
            def __init__(self):
                self.lang = "RU"
                self.questions = []
                self.user_answers = []
                self.current_idx = 0
                self.time_left = 600
                self.is_running = False
                
                self.setup_ui()
                self.load_logic()
                self.update_lang_ui()

            def load_logic(self):
                params = js.URLSearchParams.new(js.window.location.search)
                data_raw = params.get("q")
                if data_raw:
                    try:
                        data = json.loads(base64.b64decode(data_raw).decode('utf-8'))
                        self.questions = data.get("q", [])
                        self.total_time = data.get("t", 600)
                    except: self.set_defaults()
                else: self.set_defaults()

            def set_defaults(self):
                self.questions = LANGS[self.lang]["def_qs"]
                self.total_time = 300

            def update_lang_ui(self):
                l = LANGS[self.lang]
                js.document.getElementById("btn-start").innerHTML = l["start"]
                js.document.getElementById("btn-create").innerHTML = l["const"]
                js.document.getElementById("menu-info").innerHTML = l["info"].format(len(self.questions), self.total_time // 60)
                js.document.getElementById("label-time").innerHTML = l["time_label"]
                js.document.getElementById("add-q").innerHTML = l["add_q"]
                js.document.getElementById("gen-link").innerHTML = l["gen"]
                js.document.getElementById("copy-btn").innerHTML = l["copy"]
                js.document.getElementById("new-q").placeholder = l["q_ph"]
                js.document.getElementById("const-title").innerHTML = l["const_t"]
                js.document.getElementById("btn-restart-fast").innerHTML = l["restart"]

            def switch_lang(self, lang):
                self.lang = lang
                for code in ["RU", "EN"]:
                    btn = js.document.getElementById(f"lang-{code.lower()}")
                    if code == lang: btn.classList.add("active")
                    else: btn.classList.remove("active")
                if not js.URLSearchParams.new(js.window.location.search).get("q"):
                    self.set_defaults()
                self.update_lang_ui()

            def show(self, sid):
                for s in ["menu", "quiz", "constructor", "results"]:
                    js.document.getElementById(s).classList.add("hidden-section")
                js.document.getElementById(sid).classList.remove("hidden-section")
                
                # Управление видимостью переключателя языков
                lang_box = js.document.getElementById("lang-box")
                if sid == "menu":
                    lang_box.style.display = "flex"
                else:
                    lang_box.style.display = "none"

            def start_game(self, e=None):
                self.current_idx, self.user_answers = 0, []
                self.time_left = self.total_time
                self.is_running = True
                self.draw_question()
                self.show("quiz")
                asyncio.create_task(self.timer_loop())

            async def timer_loop(self):
                while self.time_left > 0 and self.is_running:
                    m, s = divmod(self.time_left, 60)
                    js.document.getElementById("timer").innerHTML = f"{m:02d}:{s:02d}"
                    await asyncio.sleep(1)
                    self.time_left -= 1
                if self.time_left <= 0 and self.is_running: self.end_game()

            def draw_question(self):
                if self.current_idx < len(self.questions):
                    q = self.questions[self.current_idx]
                    js.document.getElementById("q-text").innerHTML = q["q"]
                    js.document.getElementById("progress").innerHTML = LANGS[self.lang]["progress"].format(self.current_idx + 1, len(self.questions))
                    box = js.document.getElementById("options-box")
                    box.innerHTML = ""
                    for opt in q["o"]:
                        btn = js.document.createElement("button")
                        btn.className = "btn-choice py-5 px-8 rounded-2xl text-lg font-bold text-left"
                        btn.innerHTML = opt
                        btn.onclick = create_proxy(lambda e, v=opt: self.handle_answer(v))
                        box.appendChild(btn)
                else: self.end_game()

            def handle_answer(self, val):
                self.user_answers.append(val)
                self.current_idx += 1
                self.draw_question()

            def end_game(self):
                self.is_running = False
                win = 0
                res_box = js.document.getElementById("res-list")
                res_box.innerHTML = ""
                for i, q in enumerate(self.questions):
                    ans = self.user_answers[i] if i < len(self.user_answers) else "?"
                    is_ok = str(ans) == str(q["a"])
                    if is_ok: win += 1
                    res_box.innerHTML += f"<div class='p-4 bg-white/[0.02] border border-white/5 rounded-xl text-[11px]'><p class='font-bold opacity-60'>{q['q']}</p><p class='flex justify-between mt-1'><span>{ans}</span><span class='{'text-emerald-400' if is_ok else 'text-rose-400'} font-bold'>{q['a']}</span></p></div>"
                
                p = int((win / len(self.questions)) * 100) if self.questions else 0
                js.document.getElementById("res-perc").innerHTML = f"{p}%"
                js.document.getElementById("res-text").innerHTML = LANGS[self.lang]["res"].format(win, len(self.questions))
                self.show("results")

            def setup_ui(self):
                js.document.getElementById("btn-start").onclick = create_proxy(self.start_game)
                js.document.getElementById("btn-create").onclick = create_proxy(lambda e: self.show("constructor"))
                js.document.getElementById("back-to-menu").onclick = create_proxy(lambda e: self.show("menu"))
                js.document.getElementById("add-q").onclick = create_proxy(self.add_new_q)
                js.document.getElementById("lang-ru").onclick = create_proxy(lambda e: self.switch_lang("RU"))
                js.document.getElementById("lang-en").onclick = create_proxy(lambda e: self.switch_lang("EN"))
                js.document.getElementById("gen-link").onclick = create_proxy(self.generate_url)
                js.document.getElementById("copy-btn").onclick = create_proxy(self.copy_to_clipboard)
                js.document.getElementById("btn-restart-fast").onclick = create_proxy(lambda e: self.show("menu"))

            def add_new_q(self, e):
                txt = js.document.getElementById("new-q").value
                opts = [js.document.getElementById(f"opt-{i}").value for i in range(3)]
                if txt and all(opts):
                    if len(self.questions) > 0 and "Франции" in str(self.questions[0]["q"]): self.questions = []
                    self.questions.append({"q": txt, "o": opts, "a": opts[int(js.window.correctIdx)]})
                    self.sync_list()
                    js.document.getElementById("new-q").value = ""
                    for i in range(3): js.document.getElementById(f"opt-{i}").value = ""
            
            def sync_list(self):
                l = js.document.getElementById("q-list")
                l.innerHTML = "".join([f"<div class='bg-white/5 p-2 px-4 rounded-lg text-[10px] border border-white/5 opacity-50'>{i+1}. {q['q']}</div>" for i, q in enumerate(self.questions)])

            def generate_url(self, e):
                t = int(js.document.getElementById("new-timer").value or 10)
                blob = base64.b64encode(json.dumps({"q": self.questions, "t": t * 60}).encode()).decode()
                js.document.getElementById("share-url").value = f"{js.window.location.origin}{js.window.location.pathname}?q={blob}"
                js.document.getElementById("share-box").classList.remove("hidden-section")

            def copy_to_clipboard(self, e):
                js.navigator.clipboard.writeText(js.document.getElementById("share-url").value)
                btn = js.document.getElementById("copy-btn")
                btn.innerHTML = LANGS[self.lang]["done"]
                async def reset():
                    await asyncio.sleep(2); btn.innerHTML = LANGS[self.lang]["copy"]
                asyncio.create_task(reset())

        engine = QuizEngine()
    </script>
</body>
</html>
